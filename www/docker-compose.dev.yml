services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env.local
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    restart: unless-stopped

volumes:
  node_modules:
  next_cache:
